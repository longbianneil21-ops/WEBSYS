<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCU Admin — Class Schedule Management</title>
  <link rel="icon" type="image/png" href="../images/QCU-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      font-family: 'Montserrat', sans-serif;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-strong: #f1f5f9;
      --accent: #5b21b6;
      --accent-soft: #eef2ff;
      --text: #1f2937;
      --text-muted: #64748b;
      --border: rgba(148,163,184,.15);
      --danger: #dc2626;
      --success: #16a34a;
    }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(180deg,#eef2f8 0%,#f8fafc 100%);
      color: var(--text);
    }
    button { font-family: inherit; cursor: pointer; }
    a { text-decoration: none; color: inherit; }
    input, select, textarea { font-family: inherit; }

    /* ── App Shell ── */
    .app-shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      background: linear-gradient(180deg,#3b0d51 0%,#14132b 100%);
      color: #f8fafc; padding: 32px 24px;
      display: flex; flex-direction: column; gap: 32px;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 14px; }
    .nav-logo {
      width: 58px; height: 58px; border-radius: 18px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
    }
    .nav-logo img { width: 100%; height: 100%; object-fit: cover; }
    .brand-title { display: block; font-size: 16px; font-weight: 800; letter-spacing: .5px; }
    .brand-sub { display: block; color: rgba(248,250,252,.72); font-size: 12px; margin-top: 4px; }
    .sidebar-nav { display: grid; gap: 10px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border: none; background: transparent;
      color: #f8fafc; font-size: 14px; border-radius: 14px;
      transition: background .2s, transform .2s;
    }
    .nav-item-icon {
      width: 34px; height: 34px; display: grid; place-items: center;
      border-radius: 12px; background: rgba(255,255,255,.08); font-size: 16px;
    }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,.08); transform: translateX(2px); }
    .nav-item:hover .nav-item-icon, .nav-item.active .nav-item-icon { background: rgba(255,255,255,.18); }
    .sidebar-footer { margin-top: auto; }
    .logout-button {
      width: 100%; padding: 14px 18px;
      border: 1px solid rgba(255,255,255,.18); border-radius: 14px;
      background: transparent; color: #f8fafc; font-size: 14px; font-weight: 600;
      transition: background .2s;
    }
    .logout-button:hover { background: rgba(255,255,255,.08); }

    /* ── Main ── */
    .main-area { padding: 28px 32px; }

    /* ── Topbar ── */
    .topbar {
      display: flex; flex-wrap: wrap; justify-content: space-between;
      align-items: center; gap: 24px; margin-bottom: 28px;
    }
    .page-title { margin: 0; font-size: clamp(22px,3vw,28px); font-weight: 800; }
    .admin-badge { 
      display: inline-block; 
      padding: 6px 14px; 
      background: linear-gradient(135deg,#d97706,#b45309); 
      color: #fff; 
      border-radius: 20px; 
      font-size: 12px; 
      font-weight: 700; 
      margin-left: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; box-shadow: 0 4px 24px rgba(15,23,42,.05);
      padding: 24px;
      margin-bottom: 24px;
    }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 24px;
    }
    .section-selector {
      padding: 10px 16px; border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .section-selector:focus { outline: none; border-color: var(--accent); }

    /* ── Form ── */
    .form-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
    }
    input, select, textarea {
      padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 14px; color: var(--text);
      background: #f8fafc; outline: none;
      transition: border-color .2s, background .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent); background: #fff;
    }
    textarea { resize: vertical; min-height: 64px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 700;
      border: none; transition: all .2s; cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg,#7c3aed,#5b21b6); color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(123,58,237,.3); }
    .btn-danger {
      background: #fee2e2; color: var(--danger);
    }
    .btn-danger:hover { background: #fecaca; }
    .btn-secondary {
      background: var(--surface-strong); color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-small { padding: 8px 12px; font-size: 12px; }

    /* ── Table ── */
    .table-wrap { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1e3a8a; color: #fff; }
    thead th { padding: 14px 14px; text-align: left; font-size: 12px; font-weight: 700; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: 14px 14px; font-size: 13px; vertical-align: middle; }
    .action-cell { text-align: right; }
    .action-cell button { margin-left: 6px; }

    /* ── Alert ── */
    .alert {
      padding: 14px 16px; border-radius: 12px; margin-bottom: 16px;
      display: none;
    }
    .alert.show { display: block; animation: slideIn .3s ease; }
    .alert.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .alert.danger { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 60px 24px;
      background: var(--surface-strong); border-radius: 16px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { margin: 0 0 8px; font-size: 18px; }
    .empty-state p { margin: 0; color: var(--text-muted); font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 1200px) {
      .form-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 1100px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
    }
    @media (max-width: 768px) {
      .main-area { padding: 20px 14px; }
      .form-grid { grid-template-columns: 1fr; }
      .controls { flex-direction: column; }
      .section-selector { width: 100%; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 700px; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="nav-logo">
        <img src="../images/QCU-logo.png" alt="QCU Logo" />
      </div>
      <div>
        <span class="brand-title">QCUS-PORTAL</span>
        <span class="brand-sub">Admin Panel</span>
      </div>
    </div>
    <nav class="sidebar-nav" aria-label="Admin navigation">
      <a href="account.html" class="nav-item"><span class="nav-item-icon">👤</span>Account</a>
      <a href="admin-class-schedule.html" class="nav-item active"><span class="nav-item-icon">📚</span>Class Schedule</a>
      <a href="dashboard.html" class="nav-item"><span class="nav-item-icon">🏠</span>Back to Dashboard</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../landingpage/home.html">
        <button type="button" class="logout-button">🚪 Logout</button>
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-area">
    <header class="topbar">
      <h1 class="page-title">Class Schedule Management<span class="admin-badge">👨‍💼 Admin</span></h1>
    </header>

    <!-- Alert Message -->
    <div class="alert" id="alertMessage"></div>

    <!-- Section Selector -->
    <div class="card">
      <h3 style="margin: 0 0 16px; font-size: 16px; font-weight: 800;">Select Section</h3>
      <div class="controls">
        <select class="section-selector" id="sectionSelector" onchange="loadSectionData()">
          <option value="SBIT-1A">SBIT-1A</option>
          <option value="SBIT-1B">SBIT-1B</option>
          <option value="SBIT-1C">SBIT-1C</option>
          <option value="SBIT-1D">SBIT-1D</option>
          <option value="SBIT-1E">SBIT-1E</option>
          <option value="SBIT-1F">SBIT-1F</option>
        </select>
        <button class="btn btn-secondary" onclick="resetForm()">↻ Reset Form</button>
      </div>
    </div>

    <!-- Add/Edit Class Form -->
    <div class="card">
      <h3 style="margin: 0 0 20px; font-size: 16px; font-weight: 800;">Add/Edit Class</h3>
      <div class="form-grid">
        <div class="form-group">
          <label for="courseCode">Course Code *</label>
          <input type="text" id="courseCode" placeholder="e.g., CS 101" required />
        </div>
        <div class="form-group">
          <label for="courseName">Course Name *</label>
          <input type="text" id="courseName" placeholder="e.g., Introduction to Computer Science" required />
        </div>
        <div class="form-group">
          <label for="section">Section *</label>
          <input type="text" id="section" placeholder="e.g., A" required />
        </div>
        <div class="form-group">
          <label for="units">Units *</label>
          <input type="number" id="units" placeholder="e.g., 3" min="1" max="4" required />
        </div>
        <div class="form-group">
          <label for="days">Days *</label>
          <input type="text" id="days" placeholder="e.g., Monday, Wednesday, Friday" required />
        </div>
        <div class="form-group">
          <label for="time">Time *</label>
          <input type="text" id="time" placeholder="e.g., 9:00 AM - 10:30 AM" required />
        </div>
        <div class="form-group">
          <label for="room">Room/Building *</label>
          <input type="text" id="room" placeholder="e.g., Room 301, Engineering Bldg" required />
        </div>
        <div class="form-group">
          <label for="instructor">Instructor *</label>
          <input type="text" id="instructor" placeholder="e.g., Dr. Maria Santos" required />
        </div>
      </div>
      <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn btn-primary" onclick="addOrUpdateClass()">💾 Save Class</button>
        <button class="btn btn-secondary" onclick="resetForm()">✕ Clear Form</button>
      </div>
      <input type="hidden" id="editingIndex" value="-1" />
    </div>

    <!-- Classes List for Selected Section -->
    <div class="card">
      <h3 style="margin: 0 0 20px; font-size: 16px; font-weight: 800;">Classes for <span id="selectedSectionDisplay">SBIT-1A</span></h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Course Code</th>
              <th>Course Name</th>
              <th>Section</th>
              <th>Units</th>
              <th>Days</th>
              <th>Time</th>
              <th>Room</th>
              <th>Instructor</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="classesTableBody">
            <tr><td colspan="9" style="text-align: center; padding: 32px; color: var(--text-muted);">No classes added yet. Add a class above!</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
  const SECTIONS = ['SBIT-1A', 'SBIT-1B', 'SBIT-1C', 'SBIT-1D', 'SBIT-1E', 'SBIT-1F'];
  const API_URL = '../../WEBSYS/php/api/class-schedule.php';
  let allClassesCache = {};

  // Initialize database
  async function initializeDatabase() {
    try {
      const response = await fetch(`${API_URL}?action=init`);
      const data = await response.json();
      if (!data.success) throw new Error(data.error);
    } catch (error) {
      console.error('Database init error:', error);
    }
  }

  // Load section data from database
  async function loadSectionData() {
    const section = document.getElementById('sectionSelector').value;
    document.getElementById('selectedSectionDisplay').textContent = section;
    
    try {
      const response = await fetch(`${API_URL}?action=get&section=${encodeURIComponent(section)}`);
      const data = await response.json();
      
      if (!data.success) throw new Error(data.error);
      
      const classes = data.data || [];
      const tableBody = document.getElementById('classesTableBody');
      tableBody.innerHTML = '';
      
      if (classes.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 32px; color: var(--text-muted);">No classes added yet. Add a class above!</td></tr>';
        return;
      }
      
      classes.forEach((course) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${course.course_code}</strong></td>
          <td>${course.course_name}</td>
          <td><strong>${course.course_section}</strong></td>
          <td>${course.units}</td>
          <td>${course.days}</td>
          <td>${course.time}</td>
          <td>${course.room}</td>
          <td>${course.instructor}</td>
          <td class="action-cell">
            <button class="btn btn-secondary btn-small" onclick="editClass(${course.id})">Edit</button>
            <button class="btn btn-danger btn-small" onclick="deleteClass(${course.id})">Delete</button>
          </td>
        `;
        tableBody.appendChild(row);
      });
    } catch (error) {
      showAlert('Error loading classes: ' + error.message, 'danger');
    }
  }

  // Add or update class
  async function addOrUpdateClass() {
    const section = document.getElementById('sectionSelector').value;
    const courseCode = document.getElementById('courseCode').value.trim();
    const courseName = document.getElementById('courseName').value.trim();
    const courseSection = document.getElementById('section').value.trim();
    const units = document.getElementById('units').value.trim();
    const days = document.getElementById('days').value.trim();
    const time = document.getElementById('time').value.trim();
    const room = document.getElementById('room').value.trim();
    const instructor = document.getElementById('instructor').value.trim();
    const editingId = document.getElementById('editingIndex').value;

    if (!courseCode || !courseName || !courseSection || !units || !days || !time || !room || !instructor) {
      showAlert('Please fill in all required fields', 'danger');
      return;
    }

    const classData = {
      section: section,
      course_code: courseCode,
      course_name: courseName,
      course_section: courseSection,
      units: parseInt(units),
      days: days,
      time: time,
      room: room,
      instructor: instructor
    };

    try {
      let action = 'add';
      let message = 'Class added successfully!';
      
      if (editingId && editingId !== '-1') {
        action = 'update';
        message = 'Class updated successfully!';
        classData.id = parseInt(editingId);
      }

      const response = await fetch(`${API_URL}?action=${action}`, {
        method: action === 'add' ? 'POST' : 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(classData)
      });

      const data = await response.json();
      if (!data.success) throw new Error(data.error);

      showAlert(message, 'success');
      resetForm();
      loadSectionData();
    } catch (error) {
      showAlert('Error saving class: ' + error.message, 'danger');
    }
  }

  // Edit class
  async function editClass(id) {
    const section = document.getElementById('sectionSelector').value;
    
    try {
      const response = await fetch(`${API_URL}?action=get&section=${encodeURIComponent(section)}`);
      const data = await response.json();
      
      if (!data.success) throw new Error(data.error);
      
      const course = data.data.find(c => c.id === id);
      if (!course) throw new Error('Class not found');

      document.getElementById('courseCode').value = course.course_code;
      document.getElementById('courseName').value = course.course_name;
      document.getElementById('section').value = course.course_section;
      document.getElementById('units').value = course.units;
      document.getElementById('days').value = course.days;
      document.getElementById('time').value = course.time;
      document.getElementById('room').value = course.room;
      document.getElementById('instructor').value = course.instructor;
      document.getElementById('editingIndex').value = id;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
      showAlert('Error loading class: ' + error.message, 'danger');
    }
  }

  // Delete class
  async function deleteClass(id) {
    if (!confirm('Are you sure you want to delete this class?')) return;
    
    try {
      const response = await fetch(`${API_URL}?action=delete`, {
        method: 'DELETE',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ id: id })
      });

      const data = await response.json();
      if (!data.success) throw new Error(data.error);

      showAlert('Class deleted successfully!', 'success');
      loadSectionData();
    } catch (error) {
      showAlert('Error deleting class: ' + error.message, 'danger');
    }
  }

  // Reset form
  function resetForm() {
    document.getElementById('courseCode').value = '';
    document.getElementById('courseName').value = '';
    document.getElementById('section').value = '';
    document.getElementById('units').value = '';
    document.getElementById('days').value = '';
    document.getElementById('time').value = '';
    document.getElementById('room').value = '';
    document.getElementById('instructor').value = '';
    document.getElementById('editingIndex').value = '-1';
  }

  // Show alert
  function showAlert(message, type) {
    const alertElement = document.getElementById('alertMessage');
    alertElement.textContent = message;
    alertElement.className = `alert ${type} show`;
    
    setTimeout(() => {
      alertElement.classList.remove('show');
    }, 4000);
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    initializeDatabase();
    loadSectionData();
  });
</script>
</body>
</html>
